services:
  # Load Balancer
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api01
      - api02
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"

  # Instância 1
  api01:
    image: andrebbmelo/rinha-api-2026:latest # Imagem pública
    environment:
      - DB_PATH=/app/test.bin
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  # Instância 2
  api02:
    image: andrebbmelo/rinha-api-2026:latest # Imagem pública
    environment:
      - DB_PATH=/app/test.bin
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

networks:
  default:
    driver: bridge